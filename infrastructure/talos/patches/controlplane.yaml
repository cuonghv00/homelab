# infrastructure/talos/patches/controlplane.yaml
# Strategic merge patch format (required for talhelper 3.x multi-document configs)
cluster:
  inlineManifests:
    - name: cilium-install
      contents: |
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: cilium-install
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: cluster-admin
        subjects:
          - kind: ServiceAccount
            name: cilium-install
            namespace: kube-system
        ---
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: cilium-install
          namespace: kube-system
        ---
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: cilium-install
          namespace: kube-system
        spec:
          backoffLimit: 10
          template:
            metadata:
              labels:
                app: cilium-install
            spec:
              restartPolicy: OnFailure
              tolerations:
                - operator: Exists
              serviceAccount: cilium-install
              serviceAccountName: cilium-install
              hostNetwork: true
              containers:
                - name: cilium-install
                  image: quay.io/cilium/cilium-cli-ci:latest
                  env:
                    # These env vars are how the cilium-cli process itself reaches
                    # kube-apiserver to run the install (hostNetwork=true, so podIP is
                    # the node IP; 6443 is the real apiserver port). This is distinct
                    # from --set=k8sServiceHost/Port=localhost:7445 below, which tells
                    # the installed Cilium agents to use Talos's KubePrism (7445) so
                    # they don't depend on kube-proxy.
                    - name: KUBERNETES_SERVICE_HOST
                      valueFrom:
                        fieldRef:
                          apiVersion: v1
                          fieldPath: status.podIP
                    - name: KUBERNETES_SERVICE_PORT
                      value: "6443"
                  command:
                    - cilium
                    - install
                    - --version=1.17.4
                    - --set=ipam.mode=kubernetes
                    - --set=kubeProxyReplacement=true
                    - --set=securityContext.capabilities.ciliumAgent={CHOWN,KILL,NET_ADMIN,NET_RAW,IPC_LOCK,SYS_ADMIN,SYS_RESOURCE,DAC_OVERRIDE,FOWNER,SETGID,SETUID}
                    - --set=securityContext.capabilities.cleanCiliumState={NET_ADMIN,SYS_ADMIN,SYS_RESOURCE}
                    - --set=cgroup.autoMount.enabled=false
                    - --set=cgroup.hostRoot=/sys/fs/cgroup
                    - --set=hubble.enabled=true
                    - --set=hubble.relay.enabled=true
                    - --set=hubble.ui.enabled=true
                    - --set=k8sServiceHost=localhost
                    - --set=k8sServicePort=7445

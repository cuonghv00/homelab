# infrastructure/talos/talconfig.yaml
clusterName: homelab
talosVersion: v1.13.5
kubernetesVersion: v1.34.1
endpoint: https://192.168.10.101:6443
allowSchedulingOnControlPlanes: false

cniConfig:
  name: none

patches:
  - "@./patches/all-nodes.yaml"

nodes:
  - hostname: talos-cp-01
    ipAddress: 192.168.10.101
    installDisk: /dev/sda
    controlPlane: true
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
    networkInterfaces:
      - deviceSelector:
          physical: true
        dhcp: false
        addresses:
          - 192.168.10.101/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.10.1
    patches:
      - "@./patches/controlplane.yaml"

  - hostname: talos-w-01
    ipAddress: 192.168.10.102
    installDisk: /dev/sda
    controlPlane: false
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
    networkInterfaces:
      - deviceSelector:
          physical: true
        dhcp: false
        addresses:
          - 192.168.10.102/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.10.1

  - hostname: talos-w-02
    ipAddress: 192.168.10.103
    installDisk: /dev/sda
    controlPlane: false
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
    networkInterfaces:
      - deviceSelector:
          physical: true
        dhcp: false
        addresses:
          - 192.168.10.103/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.10.1

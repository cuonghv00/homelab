apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: lan-pool
spec:
  # LAN IPs handed to type=LoadBalancer Services. Keep this range OUTSIDE the
  # router's DHCP pool and clear of the node IPs (.101-.103). Reachable from
  # other Tailscale devices via the Proxmox subnet router (192.168.10.0/24).
  blocks:
    - start: "192.168.10.240"
      stop: "192.168.10.245"

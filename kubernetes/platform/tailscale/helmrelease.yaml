apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 1h
  chart:
    spec:
      chart: tailscale-operator
      version: ">=1.76.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  values:
    operatorConfig:
      hostname: homelab-operator
      defaultTags:
        - "tag:k8s-operator"
    oauth:
      clientId: ""
      clientSecret: ""

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.3"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system
  values:
    crds:
      enabled: true
    prometheus:
      enabled: true
      servicemonitor:
        # Disabled until kube-prometheus-stack (Task 9) installs the
        # ServiceMonitor CRD (monitoring.coreos.com). Enable after Task 9.
        enabled: false

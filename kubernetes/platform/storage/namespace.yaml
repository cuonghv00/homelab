apiVersion: v1
kind: Namespace
metadata:
  name: local-path-storage
  labels:
    # Talos enforces the "baseline" Pod Security Standard on non-exempt
    # namespaces. local-path-provisioner's on-demand helper pods mount
    # hostPath volumes, so this namespace must run as privileged or PVC
    # provisioning fails with a PodSecurity violation.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=87.0.0 <88.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    fullnameOverride: prometheus

    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 30Gi
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        # local-path is hostPath-backed, which does NOT honor fsGroup, and the
        # operator mounts the data dir via subPath (created root:root 0755 by
        # kubelet). Prometheus runs as uid 1000 and cannot write it, so it
        # crashes on /prometheus/queries.active. This root initContainer chowns
        # the data dir before Prometheus starts. Allowed because the monitoring
        # namespace is labeled pod-security privileged.
        initContainers:
          - name: init-chown-data
            image: busybox:1.37
            command: ["sh", "-c", "chown -R 1000:2000 /prometheus"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                add: ["CHOWN"]
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            volumeMounts:
              - name: prometheus-prometheus-prometheus-db
                mountPath: /prometheus
                subPath: prometheus-db

    grafana:
      defaultDashboardsTimezone: Asia/Ho_Chi_Minh
      persistence:
        enabled: true
        storageClassName: local-path
        size: 1Gi
      # Datasources added in Task 12
      additionalDataSources:
        - name: Loki
          type: loki
          uid: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy
          isDefault: false
          jsonData:
            derivedFields:
              - datasourceUid: Tempo
                matcherRegex: '"traceID":"(\w+)"'
                name: TraceID
                url: "${__value.raw}"
        - name: Tempo
          type: tempo
          uid: Tempo
          url: http://tempo.monitoring.svc.cluster.local:3200
          access: proxy
          isDefault: false
          jsonData:
            httpMethod: GET
            serviceMap:
              datasourceUid: prometheus
            nodeGraph:
              enabled: true
            lokiSearch:
              datasourceUid: loki
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL

    alertmanager:
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: [alertname, job]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: telegram
          routes:
            - receiver: telegram
              matchers:
                - alertname =~ ".*"
        receivers:
          - name: telegram
            telegram_configs:
              - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/telegram_bot_token
                chat_id: 1722454251
                parse_mode: HTML
                message: |
                  {{ range .Alerts }}
                  <b>{{ .Status | toUpper }} {{ .Labels.alertname }}</b>
                  Severity: {{ .Labels.severity }}
                  {{ .Annotations.summary }}
                  {{ .Annotations.description }}
                  {{ end }}
        templates: []
      alertmanagerSpec:
        secrets:
          - alertmanager-telegram
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 2Gi

    # Talos-specific: disable components that conflict with Talos
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

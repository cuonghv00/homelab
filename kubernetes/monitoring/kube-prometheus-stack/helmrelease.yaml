apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=87.0.0 <88.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    fullnameOverride: prometheus

    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 30Gi
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        # local-path is hostPath-backed, which does NOT honor fsGroup, and the
        # operator mounts the data dir via subPath (created root:root 0755 by
        # kubelet). Prometheus runs as uid 1000 and cannot write it, so it
        # crashes on /prometheus/queries.active. This root initContainer chowns
        # the data dir before Prometheus starts. Allowed because the monitoring
        # namespace is labeled pod-security privileged.
        initContainers:
          - name: init-chown-data
            image: busybox:1.37
            command: ["sh", "-c", "chown -R 1000:2000 /prometheus"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                add: ["CHOWN"]
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            volumeMounts:
              - name: prometheus-prometheus-prometheus-db
                mountPath: /prometheus
                subPath: prometheus-db

    grafana:
      defaultDashboardsTimezone: Asia/Ho_Chi_Minh
      persistence:
        enabled: true
        storageClassName: local-path
        size: 1Gi
      # Datasources added in Task 12
      additionalDataSources: []
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL

    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 2Gi

    # Talos-specific: disable components that conflict with Talos
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false

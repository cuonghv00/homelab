apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 1h
  dependsOn:
    - name: kube-prometheus-stack
      namespace: monitoring
  chart:
    spec:
      chart: loki
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    deploymentMode: SingleBinary
    loki:
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      auth_enabled: false
      limits_config:
        retention_period: 336h   # 14 days
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: local-path
        size: 20Gi
    # Disable distributed components (monolithic mode)
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    # Disable Loki's built-in gateway/nginx
    gateway:
      enabled: false
    # ServiceMonitor for Prometheus scraping
    monitoring:
      serviceMonitor:
        enabled: true
        labels:
          release: prometheus

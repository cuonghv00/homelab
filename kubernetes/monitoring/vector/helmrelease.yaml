apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: monitoring
spec:
  interval: 1h
  dependsOn:
    - name: loki
      namespace: monitoring
  chart:
    spec:
      chart: vector
      version: ">=0.36.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: flux-system
  values:
    role: Agent
    # Use a pre-rendered ConfigMap to avoid Helm tpl() processing {{ }} field
    # template expressions in the Vector config as Go template calls.
    existingConfigMaps:
      - vector-config
    dataDir: /vector-data-dir
    # Disable the Service since Vector Agent only pushes to Loki (no inbound)
    service:
      enabled: false

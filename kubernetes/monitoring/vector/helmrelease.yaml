apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: monitoring
spec:
  interval: 1h
  dependsOn:
    - name: loki
      namespace: monitoring
  chart:
    spec:
      chart: vector
      version: ">=0.56.0 <0.57.0"  # Vector is pre-1.0: minor bumps can break config (e.g. api.playground removed in 0.56)
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: flux-system
  values:
    role: Agent
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    # Use a pre-rendered ConfigMap to avoid Helm tpl() processing {{ }} field
    # template expressions in the Vector config as Go template calls.
    existingConfigMaps:
      - vector-config
    dataDir: /vector-data-dir
    # Disable the Service since Vector Agent only pushes to Loki (no inbound)
    service:
      enabled: false
    # Tolerate control-plane taint so Vector runs on all 3 nodes
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: monitoring
spec:
  interval: 1h
  dependsOn:
    - name: kube-prometheus-stack
      namespace: monitoring
  chart:
    spec:
      chart: tempo
      version: ">=1.0.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    tempo:
      retention: 168h
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
    persistence:
      enabled: true
      storageClassName: local-path
      size: 10Gi
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: prometheus
